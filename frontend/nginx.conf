server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Standard nginx-grense er 1m → 413 på større multipart (f.eks. /api/v1/snmp/mibs/batch).
    # Må være romslig for mange MIB-filer i én forespørsel (API: inntil 50 filer, hver inntil MIB_UPLOAD_MAX_BYTES).
    client_max_body_size 512m;

    # Docker DNS: variable in proxy_pass so `api` resolves at request time (avoids "host not found in upstream").
    # Use $request_uri: with a variable, nginx does not apply the normal location→proxy_pass URI rewrite; forwarding
    # the original path keeps /api/v1/... correct for the FastAPI app.
    location /api/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $api_upstream http://api:8000;
        proxy_pass $api_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
