services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: freehci
      POSTGRES_PASSWORD: freehci
      POSTGRES_DB: freehci
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freehci -d freehci"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # Matches freehci user in backend/Dockerfile; avoids Celery/Uvicorn running as root if an old image layer omits USER.
    user: "10001:10001"
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://freehci:freehci@postgres:5432/freehci
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:8080,http://127.0.0.1:8080
      UPLOAD_ROOT: /app/data/uploads
    volumes:
      - dcim_uploads:/app/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    user: "10001:10001"
    command:
      [
        "celery",
        "-A",
        "app.workers.celery_app.celery_app",
        "worker",
        "--loglevel=info",
      ]
    environment:
      DATABASE_URL: postgresql+psycopg://freehci:freehci@postgres:5432/freehci
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  postgres_data:
  dcim_uploads:
