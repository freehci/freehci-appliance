services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: freehci
      POSTGRES_PASSWORD: freehci
      POSTGRES_DB: freehci
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freehci -d freehci"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # Must run as root so /docker-entrypoint.sh can chown UPLOAD_ROOT and drop to `freehci` via runuser.
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://freehci:freehci@postgres:5432/freehci
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:8080,http://127.0.0.1:8080
      # Host updater service (systemd) listens on the Docker host.
      # `host.docker.internal` is mapped to the host gateway below (Linux/Debian).
      UPDATER_URL: http://host.docker.internal:8765
      UPLOAD_ROOT: /app/data/uploads
      MIB_ROOT: /app/data/mibs
      MIB_COMPILED_ROOT: /app/data/mibs/compiled
      # Overstyr i produksjon (påvirker JWT for admin-innlogging).
      JWT_SECRET: change-me-in-production-use-long-random-string
    volumes:
      - dcim_uploads:/app/data/uploads
      - dcim_mibs:/app/data/mibs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health/live', timeout=2)\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 90s
    extra_hosts:
      - "host.docker.internal:host-gateway"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command:
      [
        "celery",
        "-A",
        "app.workers.celery_app.celery_app",
        "worker",
        "--loglevel=info",
      ]
    environment:
      DATABASE_URL: postgresql+psycopg://freehci:freehci@postgres:5432/freehci
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  dcim_uploads:
  dcim_mibs:
